<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Stocks</title>
<style>
:root { --bg: #0d1117; --card: #161b22; --card2: #1c2230; --line: #283041; --text: #e6edf3; --muted: #8b949e; --up: #3fb950; --down: #f85149; --accent: #2f81f7; }
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; font-size: 16px; margin: 0; padding-bottom: 40px; }
header { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--line); padding: 12px; }
.addbar { display: flex; gap: 8px; margin-top: 10px; }
.addbar input { flex: 1; background: var(--card); border: 1px solid var(--line); color: var(--text); border-radius: 10px; padding: 12px; text-transform: uppercase; }
.addbar button { background: var(--accent); border: none; color: #fff; border-radius: 10px; padding: 0 18px; font-weight: 600; }
#list { padding: 8px 10px; }
.row { background: var(--card); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; overflow: hidden; cursor: grab; }
.row.dragging { opacity: 0.5; }
.row-main { display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer; }
.sparks-wrapper { display: flex; gap: 8px; }
.spark-box { display: flex; flex-direction: column; align-items: center; }
.spark-box label { font-size: 8px; color: var(--muted); margin-bottom: 2px; }
.spark { width: 50px; height: 30px; }
.price-block { display: flex; flex-direction: column; align-items: flex-end; min-width: 160px; padding-left: 20px; }
.price-line { font-size: 14px; font-weight: 700; }
.chg { font-size: 11px; font-weight: 500; }
.ext-row { font-size: 11px; margin-top: 2px; color: var(--muted); }
.up { color: var(--up); }
.down { color: var(--down); }
.remove-btn { background: transparent; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 5px; }
.row-detail { display: none; padding: 12px; border-top: 1px solid var(--line); }
.row.open .row-detail { display: block; }
.tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
.tab { background: var(--card2); border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.bigchart { width: 100%; height: 180px; display: block; touch-action: none; }
.meta-display { font-size: 13px; font-weight: 600; text-align: center; margin-top: 10px; color: var(--text); }
</style>
</head>
<body>
<header>
    <div style="display:flex; justify-content:space-between; align-items:center;"><h1>Stocks</h1><button id="refreshBtn">Refresh</button></div>
    <div class="addbar">
        <input id="addInput" list="stock-suggestions" placeholder="Add ticker">
        <datalist id="stock-suggestions">
            <option value="AAPL">Apple</option><option value="MSFT">Microsoft</option><option value="NVDA">Nvidia</option><option value="TSLA">Tesla</option><option value="BTC-USD">Bitcoin</option><option value="ETH-USD">Ethereum</option>
        </datalist>
        <button id="addBtn">Add</button>
    </div>
</header>
<div id="list"></div>

<script>
"use strict";
const STORE_KEY = "stocksWatchlist";
let watchlist = JSON.parse(localStorage.getItem(STORE_KEY) || '["AAPL", "MSFT", "TSLA"]');

async function fetchYahoo(sym, range="1d", interval="2m") {
    const proxies = ["https://corsproxy.io/?url=", "https://api.allorigins.win/raw?url="];
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=${range}&interval=${interval}&includePrePost=true&_=${Date.now()}`;
    for(const p of proxies) {
        try {
            const res = await fetch(p + encodeURIComponent(url));
            const json = await res.json();
            const resData = json.chart.result[0];
            const meta = resData.meta;
            const quotes = resData.indicators.quote[0].close.filter(q => q !== null);
            return { regPrice: meta.regularMarketPrice, extPrice: quotes[quotes.length-1], prevClose: meta.previousClose, currency: meta.currency, points: quotes };
        } catch(e) { continue; }
    }
}

function draw(canvas, data, isUp, touches = [], showGrid = false, isMini = false) {
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    const plotW = showGrid ? (w - 50) : w;
    
    ctx.clearRect(0, 0, w, h);
    const valid = data.filter(n => n);
    const min = Math.min(...valid), max = Math.max(...valid);
    
    if (showGrid) {
        ctx.strokeStyle = "#283041"; ctx.lineWidth = 1; ctx.font = "10px sans-serif"; ctx.fillStyle = "#8b949e";
        for (let i = 0; i <= 4; i++) {
            const y = h - (i / 4) * h;
            const val = min + (i / 4) * (max - min);
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(plotW, y); ctx.stroke();
            ctx.fillText(val.toFixed(2), plotW + 5, y + 3);
        }
    }

    ctx.strokeStyle = isUp ? "#3fb950" : "#f85149";
    ctx.lineWidth = isMini ? 1 : 2; 
    ctx.beginPath();
    data.forEach((val, i) => {
        const x = (i / (data.length - 1)) * plotW;
        const y = h - ((val - min) / (max - min)) * h;
        if(val) i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    touches.forEach(t => {
        ctx.strokeStyle = "#fff"; ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(t.x, 0); ctx.lineTo(t.x, h); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(t.x, t.y, 5, 0, Math.PI*2); ctx.fill();
    });
}

async function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    watchlist.forEach((sym, index) => {
        const row = document.createElement("div");
        row.className = "row";
        row.draggable = true;
        row.dataset.index = index;
        row.innerHTML = `<div class="row-main">
                            <div style="font-weight:700; flex:1">${sym}</div>
                            <div class="sparks-wrapper">
                                <div class="spark-box"><label>1D</label><canvas class="spark spark-1d" width="50" height="30"></canvas></div>
                                <div class="spark-box"><label>YTD</label><canvas class="spark spark-ytd" width="50" height="30"></canvas></div>
                            </div>
                            <div class="price-block">
                                <div class="price-line">--</div>
                                <div class="ext-row"></div>
                            </div>
                            <button class="remove-btn" title="Remove">&times;</button>
                         </div>
                         <div class="row-detail"><div class="tabs"></div><canvas class="bigchart" width="450" height="180"></canvas><div class="meta-display">Place 2 fingers to measure</div></div>`;
        
        row.ondragstart = (e) => { e.dataTransfer.setData("text/plain", index); row.classList.add("dragging"); };
        row.ondragend = () => row.classList.remove("dragging");
        row.ondragover = (e) => e.preventDefault();
        row.ondrop = (e) => {
            e.preventDefault();
            const fromIndex = parseInt(e.dataTransfer.getData("text/plain"));
            const movedItem = watchlist.splice(fromIndex, 1)[0];
            watchlist.splice(index, 0, movedItem);
            localStorage.setItem(STORE_KEY, JSON.stringify(watchlist));
            render();
        };

        row.querySelector(".remove-btn").onclick = (e) => { e.stopPropagation(); watchlist.splice(index, 1); localStorage.setItem(STORE_KEY, JSON.stringify(watchlist)); render(); };
        row.querySelector(".row-main").onclick = () => { row.classList.toggle("open"); if(row.classList.contains("open") && !row.dataset.loaded) { loadDetail(row, sym); row.dataset.loaded = "1"; } };
        
        list.appendChild(row);

        fetchYahoo(sym, "1d", "2m").then(q => {
            const dayDiff = q.regPrice - q.prevClose;
            const dayPct = (dayDiff / q.prevClose) * 100;
            const isUp = dayDiff >= 0;
            draw(row.querySelector(".spark-1d"), q.points, isUp, [], false, true);
            row.querySelector(".price-line").innerHTML = `${(q.currency==="USD"?"$":"") + q.regPrice.toFixed(2)} <span class="chg ${isUp?"up":"down"}">${dayDiff > 0 ? "+" : ""}${dayDiff.toFixed(2)} (${dayPct.toFixed(2)}%)</span>`;
            
            const extDiff = q.extPrice - q.regPrice;
            if (Math.abs(extDiff) > 0.01) {
                const extPct = (extDiff / q.regPrice) * 100;
                row.querySelector(".ext-row").innerHTML = `${(q.currency==="USD"?"$":"") + q.extPrice.toFixed(2)} <span class="${extDiff >= 0 ? "up" : "down"}">${extDiff > 0 ? "+" : ""}${extDiff.toFixed(2)} (${extPct.toFixed(2)}%)</span>`;
            }
        });
        fetchYahoo(sym, "ytd", "1d").then(q => {
            draw(row.querySelector(".spark-ytd"), q.points, q.points[q.points.length-1] >= q.points[0], [], false, true);
        });
    });
}

function loadDetail(row, sym) {
    const tabs = { "1D": ["1d","2m"], "1W": ["5d","15m"], "1M": ["1mo","1d"], "YTD": ["ytd","1d"], "1Y": ["1y","1d"], "5Y": ["5y","1wk"] };
    const tabsEl = row.querySelector(".tabs");
    const canvas = row.querySelector(".bigchart");
    const metaEl = row.querySelector(".meta-display");
    let currentData = [];

    Object.keys(tabs).forEach(t => {
        const btn = document.createElement("div");
        btn.className = "tab" + (t==="1D"?" active":"");
        btn.textContent = t;
        btn.onclick = async () => {
            row.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            const q = await fetchYahoo(sym, tabs[t][0], tabs[t][1]);
            currentData = q.points;
            draw(canvas, currentData, currentData[currentData.length-1] >= currentData[0], [], true, false);
            const start = currentData[0], end = currentData[currentData.length-1], high = Math.max(...currentData), low = Math.min(...currentData);
            const diff = end - start, pct = (diff / start) * 100;
            metaEl.innerHTML = `Perf: <span class="${diff>=0?'up':'down'}">${diff>0?'+':''}${diff.toFixed(2)} (${pct.toFixed(2)}%)</span> | H: $${high.toFixed(2)} | L: $${low.toFixed(2)}`;
        };
        tabsEl.appendChild(btn);
    });
    
    canvas.ontouchmove = (e) => {
        if(e.touches.length === 2) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const pts = [];
            const plotW = canvas.width - 50;
            for(let t of e.touches) {
                const x = Math.max(0, Math.min(plotW, t.clientX - rect.left));
                const idx = Math.floor((x / plotW) * (currentData.length - 1));
                pts.push({ x: x, y: canvas.height - ((currentData[idx] - Math.min(...currentData)) / (Math.max(...currentData) - Math.min(...currentData))) * canvas.height, val: currentData[idx] });
            }
            pts.sort((a,b) => a.x - b.x);
            draw(canvas, currentData, currentData[currentData.length-1] >= currentData[0], pts, true, false);
            const diff = pts[1].val - pts[0].val;
            const pct = (diff / pts[0].val) * 100;
            metaEl.innerHTML = `L: $${pts[0].val.toFixed(2)} | R: $${pts[1].val.toFixed(2)} | Diff: <span class="${diff>=0?'up':'down'}">${diff>0?'+':''}${diff.toFixed(2)} (${pct.toFixed(2)}%)</span>`;
        }
    };
    row.querySelector(".tab").onclick();
}

document.getElementById("addBtn").addEventListener("click", () => {
    const val = document.getElementById("addInput").value.toUpperCase();
    if(val && !watchlist.includes(val)) { watchlist.push(val); localStorage.setItem(STORE_KEY, JSON.stringify(watchlist)); render(); }
});
document.getElementById("refreshBtn").addEventListener("click", render);
render();
</script>
</body>
</html>
