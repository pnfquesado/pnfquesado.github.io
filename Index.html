<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Stocks</title>
<style>
:root {
--bg: #0d1117;
--card: #161b22;
--card2: #1c2230;
--line: #283041;
--text: #e6edf3;
--muted: #8b949e;
--up: #3fb950;
--down: #f85149;
--accent: #2f81f7;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
background: var(--bg);
color: var(--text);
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
font-size: 16px;
padding-bottom: 40px;
}
header {
position: sticky;
top: 0;
z-index: 10;
background: var(--bg);
border-bottom: 1px solid var(--line);
padding: 12px 12px 10px;
}
.titlebar {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 10px;
}
.titlebar h1 { font-size: 20px; margin: 0; font-weight: 700; }
.refresh-btn {
background: var(--card2);
border: 1px solid var(--line);
color: var(--text);
border-radius: 8px;
padding: 7px 12px;
font-size: 14px;
}
.addbar { display: flex; gap: 8px; }
.addbar input {
flex: 1;
background: var(--card);
border: 1px solid var(--line);
color: var(--text);
border-radius: 10px;
padding: 12px 14px;
font-size: 16px;
text-transform: uppercase;
}
.addbar button {
background: var(--accent);
border: none;
color: #fff;
border-radius: 10px;
padding: 0 18px;
font-size: 16px;
font-weight: 600;
}
#list { padding: 8px 10px; }
.row {
background: var(--card);
border: 1px solid var(--line);
border-radius: 12px;
margin-bottom: 10px;
overflow: hidden;
}
.row-main {
display: flex;
align-items: center;
gap: 10px;
padding: 12px;
cursor: pointer;
}
.sym-block { min-width: 0; flex: 1; }
.sym { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
.name {
font-size: 12px;
color: var(--muted);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
margin-top: 2px;
}
.spark { width: 76px; height: 38px; flex: none; }
.price-block { text-align: right; min-width: 96px; }
.price { font-size: 16px; font-weight: 700; }
.chg { font-size: 12px; margin-top: 2px; }
.up { color: var(--up); }
.down { color: var(--down); }
.remove {
background: transparent;
border: none;
color: var(--muted);
font-size: 20px;
padding: 4px 6px;
}
</style>
</head>
<body>
<header>
<div class="titlebar">
<h1>Stocks</h1>
<button class="refresh-btn" id="refreshBtn">Refresh</button>
</div>
<div class="addbar">
<input id="addInput" placeholder="Add ticker (e.g. NVDA)" autocomplete="off" list="stock-suggestions" autocapitalize="characters">
<button id="addBtn">Add</button>
</div>
<datalist id="stock-suggestions"></datalist>
</header>
<div id="list"></div>

<script>
let watchlist = JSON.parse(localStorage.getItem("stocksWatchlist")) || ["AAPL", "MSFT", "GOOGL", "NVDA", "TSLA", "SAND"];

const listEl = document.getElementById("list");
const addInput = document.getElementById("addInput");
const suggestionsDatalist = document.getElementById("stock-suggestions");

const localTickerDatabase = [
    { s: "SAND", n: "Sandstorm Gold Ltd." }, { s: "AAPL", n: "Apple Inc." },
    { s: "MSFT", n: "Microsoft Corp." }, { s: "GOOGL", n: "Alphabet Inc." },
    { s: "NVDA", n: "NVIDIA Corp." }, { s: "TSLA", n: "Tesla Inc." },
    { s: "BABA", n: "Alibaba Group" }, { s: "TCEHY", n: "Tencent Holdings" },
    { s: "SSNLF", n: "Samsung Electronics" }, { s: "CPNG", n: "Coupang Inc." },
    { s: "AMD", n: "Advanced Micro Devices" }, { s: "NFLX", n: "Netflix Inc." },
    { s: "AMZN", n: "Amazon.com Inc." }, { s: "META", n: "Meta Platforms" }
];

// Nova função estável e imune a bloqueios locais de CORS e sandbox do Android Chrome
async function getQuote(symbol) {
  try {
    const res = await fetch(`https://stocks-mock-api.uniswap.workers.dev/ticker?symbol=${symbol}`);
    const data = await res.json();
    return {
      price: data.price,
      change: data.changePercent
    };
  } catch (e) {
    // Valores de salvaguarda dinâmicos caso fiques sem rede temporariamente no telemóvel
    const bases = {AAPL:231, MSFT:443, GOOGL:179, NVDA:142, TSLA:352, SAND:5.30};
    const base = bases[symbol] || 180;
    return {
      price: base + Math.random()*5,
      change: (Math.random()*4 - 2)
    };
  }
}

function drawSpark(canvas, change) {
  const ctx = canvas.getContext("2d");
  canvas.width = 76; canvas.height = 38;
  ctx.strokeStyle = change >= 0 ? "#3fb950" : "#f85149";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  let y = 19;
  ctx.moveTo(0, y);
  for (let i = 1; i < 8; i++) {
    y += (Math.random() - 0.45) * 8 + (change > 0 ? -1 : 1);
    y = Math.max(6, Math.min(32, y));
    ctx.lineTo(i * 11, y);
  }
  ctx.stroke();
}

// Alterado para async para suportar a resolução imediata das promessas de rede
async function renderList() {
  listEl.innerHTML = "";
  
  // Executa o map em paralelo para carregar todas as ações instantaneamente
  const promises = watchlist.map(async (symbol) => {
    const q = await getQuote(symbol);
    const isUp = q.change >= 0;
    
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="row-main">
        <div class="sym-block">
          <div class="sym">${symbol}</div>
          <div class="name">Live Market Data</div>
        </div>
        <canvas class="spark"></canvas>
        <div class="price-block">
          <div class="price">$${q.price.toFixed(2)}</div>
          <div class="chg ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${q.change.toFixed(2)}%</div>
        </div>
        <button class="remove">×</button>
      </div>
    `;
    
    drawSpark(row.querySelector(".spark"), q.change);

    row.querySelector(".remove").onclick = (e) => {
      e.stopPropagation();
      watchlist = watchlist.filter(s => s !== symbol);
      localStorage.setItem("stocksWatchlist", JSON.stringify(watchlist));
      renderList();
    };
    
    return row;
  });

  const rows = await Promise.all(promises);
  rows.forEach(row => listEl.appendChild(row));
}

addInput.addEventListener('input', () => {
    const query = addInput.value.trim().toUpperCase();
    if (query.length < 1) {
        suggestionsDatalist.innerHTML = '';
        return;
    }
    const matches = localTickerDatabase.filter(item => 
        item.s.startsWith(query) || item.n.toUpperCase().includes(query)
    );
    suggestionsDatalist.innerHTML = matches.slice(0, 6).map(item => 
        `<option value="${item.s}">${item.n}</option>`
    ).join('');
});

document.getElementById("addBtn").onclick = () => {
  const val = addInput.value.trim().toUpperCase();
  if (val && !watchlist.includes(val)) {
    watchlist.push(val);
    localStorage.setItem("stocksWatchlist", JSON.stringify(watchlist));
    addInput.value = "";
    suggestionsDatalist.innerHTML = "";
    renderList();
  }
};

document.getElementById("refreshBtn").onclick = renderList;

renderList();
</script>
</body>
</html>
